<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberIntel — Live Feed</title>
<style>
  :root {
    --bg: #0a0e12;
    --panel: #11161c;
    --panel-2: #161d25;
    --line: #1f2933;
    --ink: #c9d4df;
    --ink-dim: #6b7a89;
    --ink-faint: #3d4853;
    --live: #36f9a0;
    --live-dim: #1d8a5a;
    --alert: #ff5c5c;
    --mono: "SFMono-Regular", "JetBrains Mono", "Consolas", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- header / console bar ---- */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 22px;
    background: linear-gradient(180deg, #0d1217, #0a0e12);
    border-bottom: 1px solid var(--line);
  }

  .brand {
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-size: 13px;
    color: var(--ink);
  }
  .brand b { color: var(--live); }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--ink-faint);
    flex: none;
  }
  .dot.live {
    background: var(--live);
    box-shadow: 0 0 0 0 rgba(54, 249, 160, 0.6);
    animation: pulse 1.8s infinite;
  }
  .dot.crawling { background: var(--live); animation: pulse 1s infinite; }
  .dot.error { background: var(--alert); }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(54,249,160,0.5); }
    70%  { box-shadow: 0 0 0 7px rgba(54,249,160,0); }
    100% { box-shadow: 0 0 0 0 rgba(54,249,160,0); }
  }

  .spacer { flex: 1; }

  .counter {
    font-size: 12px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
  }
  .counter b { color: var(--ink); font-size: 15px; }

  button {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--live);
    border: none;
    padding: 8px 16px;
    cursor: pointer;
    font-weight: 700;
    transition: filter .15s ease, opacity .15s ease;
  }
  button:hover { filter: brightness(1.12); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

  /* ---- feed ---- */
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 26px 22px 80px;
  }

  .feed-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    color: var(--ink-faint);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 4px;
  }

  .row {
    display: grid;
    grid-template-columns: 86px 1fr;
    gap: 16px;
    padding: 16px 4px;
    border-bottom: 1px solid var(--line);
    animation: slidein .45s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-8px); background: rgba(54,249,160,.05); }
    to   { opacity: 1; transform: translateY(0);    background: transparent; }
  }
  @media (prefers-reduced-motion: reduce) {
    .row { animation: none; }
    .dot.live, .dot.crawling { animation: none; }
  }

  .meta { text-align: right; }
  .src {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 700;
    color: var(--bg);
    white-space: nowrap;
  }
  .time { display: block; margin-top: 7px; font-size: 11px; color: var(--ink-faint); }
  .wc   { display: block; margin-top: 2px; font-size: 11px; color: var(--ink-faint); }
  .sevdot {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    margin-bottom: 6px;
  }

  .title {
    color: var(--ink);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    text-decoration: none;
    display: inline-block;
  }
  .title:hover { color: var(--live); }
  .preview {
    margin: 6px 0 0;
    color: var(--ink-dim);
    font-size: 13px;
  }
  .byline { margin-top: 7px; font-size: 11px; color: var(--ink-faint); letter-spacing: .04em; }
  .pubdate { color: var(--ink-dim); font-weight: 600; }
  .gen-btn {
    margin-top: 10px;
    font-size: 11px;
    padding: 6px 12px;
    background: transparent;
    color: var(--live);
    border: 1px solid var(--live-dim);
  }
  .gen-btn:hover { background: var(--live); color: var(--bg); }
  .gen-btn:disabled {
    opacity: .4;
    cursor: not-allowed;
    border-color: var(--ink-faint);
    color: var(--ink-faint);
  }

  .empty {
    color: var(--ink-faint);
    text-align: center;
    padding: 60px 20px;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .empty .blink { animation: blink 1.1s step-end infinite; color: var(--live); }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
  <header>
    <span class="brand">Cyber<b>Intel</b></span>
    <span class="status">
      <span class="dot" id="dot"></span>
      <span id="statustext">connecting</span>
    </span>
    <span class="spacer"></span>
    <span class="counter"><b id="count">0</b> articles this session</span>
    <button id="startbtn">Start crawl</button>
    <button id="stopbtn" disabled>Stop crawl</button>
  </header>

  <main>
    <div class="feed-head">
      <span>Live feed</span>
      <span style="flex:1"></span>
      <span id="conn">— offline</span>
    </div>
    <div id="feed">
      <div class="empty" id="empty">
        Waiting for articles<span class="blink">▌</span><br />
        Start a crawl, or one may already be running.
      </div>
    </div>
  </main>

<script>
(function () {
  const feed = document.getElementById("feed");
  const empty = document.getElementById("empty");
  const countEl = document.getElementById("count");
  const dot = document.getElementById("dot");
  const statusText = document.getElementById("statustext");
  const conn = document.getElementById("conn");
  const startBtn = document.getElementById("startbtn");
  const stopBtn = document.getElementById("stopbtn");

  let count = 0;

  const seenIds = new Set();

  // Deterministic per-source color so each channel is recognizable at a glance.
  const SRC_COLORS = {};
  const PALETTE = ["#36f9a0","#5cb8ff","#ffb454","#c792ea","#ff79c6","#8ce99a","#ffd866"];
  const SEV = {
    high:   { color: "#ff5c5c", label: "HIGH" },
    medium: { color: "#ffb454", label: "MED"  },
    low:    { color: "#36f9a0", label: "LOW"  },
  };
  function colorFor(src) {
    if (!SRC_COLORS[src]) {
      const i = Object.keys(SRC_COLORS).length % PALETTE.length;
      SRC_COLORS[src] = PALETTE[i];
    }
    return SRC_COLORS[src];
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function parseDate(s) {
    if (!s) return 0;
    const t = Date.parse(s);
    return isNaN(t) ? 0 : t;
  }

  function addArticle(a) {
    if (a.id != null) {
      if (seenIds.has(a.id)) return;   // already shown (backfill + live overlap)
      seenIds.add(a.id);
    }
    if (empty) empty.remove();
    count += 1;
    countEl.textContent = count;

    const color = colorFor(a.source || "unknown");
    const sev = SEV[(a.severity || "low").toLowerCase()] || SEV.low;
    const now = new Date().toLocaleTimeString([], {hour12:false});

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="meta">
        <span class="sevdot" style="background:${sev.color}" title="${sev.label}"></span>
        <span class="src" style="background:${color}">${esc(a.source)}</span>
        <span class="time">${now}</span>
        <span class="wc">${a.word_count || 0} words</span>
      </div>
      <div>
        <a class="title" href="${esc(a.url)}" target="_blank" rel="noopener">${esc(a.title)}</a>
        ${a.preview ? `<p class="preview">${esc(a.preview)}…</p>` : ""}
        ${a.author || a.date ? `<div class="byline">${a.date ? `<span class="pubdate">📅 ${esc(a.date)}</span>` : ""}${a.author ? `${a.date ? " · " : ""}by ${esc(a.author)}` : ""}</div>` : ""}
        <button class="gen-btn" data-id="${a.id ?? ""}">Generate PDF</button>
      </div>`;

    row.dataset.ts = parseDate(a.date);
    const ts = Number(row.dataset.ts);
    let placed = false;

    for (const existing of feed.children) {
      if (ts > Number(existing.dataset.ts || 0)) {
        feed.insertBefore(row, existing);
        placed = true;
        break;
      }
    }

    if (!placed) feed.appendChild(row);

    // Keep the DOM bounded during long sessions.
    while (feed.children.length > 200) feed.removeChild(feed.lastChild);
  }

  function setStatus(state, text) {
    dot.className = "dot " + state;
    statusText.textContent = text;
  }

  async function backfill() {
    try {
      const r = await fetch("/articles/?limit=300");
      const data = await r.json();
      for (const a of data.articles) {
        addArticle({
          id: a.id,
          url: a.url,
          title: a.title,
          source: a.source,
          author: a.author,
          date: a.date,
          preview: (a.clean_text || a.raw_text || "").slice(0, 240),
          word_count: (a.raw_text || "").split(/\s+/).filter(Boolean).length,
          severity: a.severity || "low",
        });
      }
    } catch (e) {
      console.error("backfill failed", e);
    }
  }

  // ---- SSE connection ----
  function connect() {
    const es = new EventSource("/crawl/stream");

    es.addEventListener("hello", () => {
      conn.textContent = "● online";
      conn.style.color = "var(--live)";
      setStatus("live", "live");
    });

    es.addEventListener("article", (e) => {
      try { addArticle(JSON.parse(e.data)); } catch (_) {}
    });

    es.addEventListener("status", (e) => {
      try {
        const s = JSON.parse(e.data);
        if (s.running) {
          setStatus("crawling", s.message || "crawling");
          startBtn.disabled = true;
          stopBtn.disabled = false;
        }
        else {
          setStatus(s.message && s.message.startsWith("error") ? "error" : "live",
                    s.message || "idle");
          startBtn.disabled = false;
          stopBtn.disabled = true;
        }
      } catch (_) {}
    });

    es.onerror = () => {
      conn.textContent = "○ reconnecting";
      conn.style.color = "var(--ink-faint)";
      setStatus("", "reconnecting");
      // EventSource auto-reconnects; no manual retry needed.
    };
  }

  startBtn.addEventListener("click", async () => {
    startBtn.disabled = true;
    stopBtn.disabled = false;
    setStatus("crawling", "starting");
    try {
      const r = await fetch("/crawl/start", { method: "POST" });
      const j = await r.json();
      if (j.status === "already running") setStatus("crawling", "already running");
    } catch (_) {
      setStatus("error", "start failed");
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
  });

  stopBtn.addEventListener("click", async () => {
    stopBtn.disabled = true;
    setStatus("crawling", "stopping");
    try { await fetch("/crawl/stop", { method: "POST" }); }
    catch (_) { setStatus("error", "stop failed"); }
  });

  feed.addEventListener("click", async (e) => {
    const btn = e.target.closest(".gen-btn");
    if (!btn) return;
    const id = btn.dataset.id;
    if (!id) { btn.textContent = "no id"; return; }

    btn.disabled = true;
    btn.textContent = "Generating...";
    try {
      const r = await fetch(`/reports/generate/${id}`, { method: "POST" });
      if (!r.ok) throw new Error(await r.text());
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `report_${id}.pdf`;
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = "PDF saved";
    } catch (_) {
      btn.textContent = "failed - retry";
      btn.disabled = false;
    }
  });

  backfill();
  connect();
})();
</script>
</body>
</html>
